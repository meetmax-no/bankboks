    </text>

    <!-- Vault-liste mockup -->
    <rect x="860" y="265" width="680" height="540" rx="14" fill="url(#glassLight)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

    <!-- Mock-entries -->
    <g font-family="-apple-system, system-ui, sans-serif">
      <!-- Entry 1 — Github -->
      <g transform="translate(880, 290)">
        <rect x="0" y="0" width="640" height="68" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <circle cx="34" cy="34" r="18" fill="#1e293b"/>
        <text x="34" y="40" text-anchor="middle" font-size="18">⚙️</text>
        <text x="68" y="28" font-size="15" font-weight="700" fill="#ffd700">⭐</text>
        <text x="92" y="29" font-size="15" font-weight="600" fill="white">GitHub · Personal</text>
        <text x="68" y="50" font-size="12" fill="rgba(255,255,255,0.55)">mike@kodo.no</text>
        <text x="68" y="62" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="rgba(255,255,255,0.35)">••••••••••••••••</text>
        <rect x="540" y="22" width="80" height="22" rx="11" fill="rgba(96,165,250,0.2)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
        <text x="580" y="37" text-anchor="middle" font-size="10" fill="#93c5fd" font-weight="600">💼 Jobb</text>
      </g>

      <!-- Entry 2 — Pass -->
      <g transform="translate(880, 370)">
        <rect x="0" y="0" width="640" height="68" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <circle cx="34" cy="34" r="18" fill="#1e293b"/>
        <text x="34" y="40" text-anchor="middle" font-size="18">🛂</text>
        <text x="68" y="28" font-size="15" font-weight="700" fill="#ffd700">⭐</text>
        <text x="92" y="29" font-size="15" font-weight="600" fill="white">Pass · Norge 🇳🇴</text>
        <text x="68" y="50" font-size="12" fill="rgba(255,255,255,0.55)">Utløper: 2031-08-14</text>
        <text x="68" y="62" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="rgba(255,255,255,0.35)">Pass-nr: ••••••••</text>
        <rect x="540" y="22" width="80" height="22" rx="11" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
        <text x="580" y="37" text-anchor="middle" font-size="10" fill="#86efac" font-weight="600">🏠 Personlig</text>
      </g>

      <!-- Entry 3 — DnB -->
      <g transform="translate(880, 450)">
        <rect x="0" y="0" width="640" height="68" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <circle cx="34" cy="34" r="18" fill="#1e293b"/>
        <text x="34" y="40" text-anchor="middle" font-size="18">🏦</text>
        <text x="92" y="29" font-size="15" font-weight="600" fill="white">DnB Nettbank</text>
        <text x="68" y="50" font-size="12" fill="rgba(255,255,255,0.55)">123 45 67890</text>
        <text x="68" y="62" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="rgba(255,255,255,0.35)">PIN: ••••</text>
        <rect x="540" y="22" width="80" height="22" rx="11" fill="rgba(245,158,11,0.2)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
        <text x="580" y="37" text-anchor="middle" font-size="10" fill="#fcd34d" font-weight="600">🏦 Bank</text>
      </g>

      <!-- Entry 4 — Kjørekort -->
      <g transform="translate(880, 530)">
        <rect x="0" y="0" width="640" height="68" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <circle cx="34" cy="34" r="18" fill="#1e293b"/>
        <text x="34" y="40" text-anchor="middle" font-size="18">🚗</text>
        <text x="92" y="29" font-size="15" font-weight="600" fill="white">Førerkort</text>
        <text x="68" y="50" font-size="12" fill="rgba(255,255,255,0.55)">Klasse B · Utstedt 2018</text>
        <text x="68" y="62" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="rgba(255,255,255,0.35)">Nr: ••••••••</text>
        <rect x="540" y="22" width="80" height="22" rx="11" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
        <text x="580" y="37" text-anchor="middle" font-size="10" fill="#86efac" font-weight="600">🏠 Personlig</text>
      </g>

      <!-- Entry 5 — Apple ID -->
      <g transform="translate(880, 610)">
        <rect x="0" y="0" width="640" height="68" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <circle cx="34" cy="34" r="18" fill="#1e293b"/>
        <text x="34" y="40" text-anchor="middle" font-size="18">🍎</text>
        <text x="92" y="29" font-size="15" font-weight="600" fill="white">Apple ID</text>
        <text x="68" y="50" font-size="12" fill="rgba(255,255,255,0.55)">mike@icloud.com</text>
        <text x="68" y="62" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="rgba(255,255,255,0.35)">••••••••••••••••</text>
        <rect x="540" y="22" width="80" height="22" rx="11" fill="rgba(167,139,250,0.2)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
        <text x="580" y="37" text-anchor="middle" font-size="10" fill="#c4b5fd" font-weight="600">👥 Sosial</text>
      </g>

      <!-- "+ N flere" -->
      <text x="1200" y="710" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">
        + 87 oppføringer til
      </text>
    </g>

    <!-- Status-linje bunn -->
    <g transform="translate(860, 745)">
      <rect x="0" y="0" width="680" height="46" rx="10" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
      <text x="20" y="20" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#6ee7b7" font-weight="600">
        ✓ Klartekst kun i nettleser-minnet
      </text>
      <text x="20" y="38" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="rgba(110,231,183,0.7)">
        Auto-låst etter 15 min · utklippstavlen tømmes etter 30 sek · ingen lokal lagring
      </text>
    </g>
  </g>

  <!-- ============== SENTRAL NØKKEL ============== -->
  <g transform="translate(800, 470)">
    <!-- Stor sirkel-bakgrunn -->
    <circle r="70" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.4)" stroke-width="2"/>
    <circle r="55" fill="url(#keyGrad)" filter="url(#glow)"/>

    <!-- Nøkkel-symbol -->
    <g transform="translate(0, 0)" fill="white">
      <circle cx="-12" cy="0" r="14" fill="none" stroke="white" stroke-width="4"/>
      <line x1="2" y1="0" x2="22" y2="0" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <line x1="14" y1="0" x2="14" y2="8" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <line x1="20" y1="0" x2="20" y2="6" stroke="white" stroke-width="4" stroke-linecap="round"/>
    </g>

    <text y="100" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fbbf24" letter-spacing="2">
      DITT MASTER-PASSORD
    </text>
    <text y="120" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="rgba(251,191,36,0.7)">
      Nøkkelen som åpner høyre side
    </text>
  </g>

  <!-- Footer -->
  <text x="800" y="860" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" letter-spacing="3">
    Ko|Do · Vault — LEAN SECURITY, IKKE SECURITY-AS-A-SERVICE
  </text>
</svg>
